{% extends "base_recepcion.html" %}

{% block titulo %}
Registrar Paciente
{% endblock %}

{% block contenido %}

<h2>Registrar Paciente</h2>

<form method="POST"
      action="{{ url_for('pacientes.guardar_paciente') }}">

<label>Nombres</label>

<input
type="text"
name="nombres"
required>

<label>Apellidos</label>

<input
type="text"
name="apellidos"
required>

<label>Carnet de Identidad</label>

<input
type="text"
name="ci"
required>

<label>Fecha de Nacimiento</label>

<input
type="date"
name="fecha_nacimiento"
required>

<label>Género</label>

<select name="genero">

<option value="M">
Masculino
</option>

<option value="F">
Femenino
</option>

<option value="O">
Otro
</option>

</select>

<label>Carpeta Familiar</label>

<select name="id_familia" required>

{% for familia in familias %}

<option
value="{{ familia[0] }}"
{% if id_familia and id_familia|int == familia[0] %}
selected
{% endif %}>

{{ familia[1] }}

</option>

{% endfor %}

</select>

<br><br>

<button>

Guardar Paciente

</button>

</form>

{% endblock %}
