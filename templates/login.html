<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>PostaNet - Inicio de Sesión</title>

    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>🏥 POSTANET</h1>

        <h3>Sistema de Gestión de Carpetas Médicas</h3>

        <hr>

        <form method="POST">

            <label>Usuario</label>

            <input
            type="text"
            name="usuario"
            placeholder="Ingrese su usuario"
            required>

            <label>Contraseña</label>

            <input
            type="password"
            name="password"
            placeholder="Ingrese su contraseña"
            required>

            <button type="submit">

                🔑 Ingresar

            </button>

        </form>

    </div>

</div>

</body>

</html>
