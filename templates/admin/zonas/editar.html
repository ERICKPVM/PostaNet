{% extends "base.html" %}

{% block titulo %}
Editar Zona
{% endblock %}

{% block contenido %}

<h2>Editar Zona</h2>

<form method="POST"
      action="{{ url_for('zonas.actualizar_zona') }}">

    <input
        type="hidden"
        name="id_zona"
        value="{{ zona[0] }}">

    <label>Nombre de la Zona</label>

    <br><br>

    <input
        type="text"
        name="nombre_zona"
        value="{{ zona[1] }}"
        required>

    <br><br>

    <button type="submit">
        💾 Actualizar
    </button>

    <a href="{{ url_for('zonas.listar_zonas') }}">
        Cancelar
    </a>

</form>

{% endblock %}
